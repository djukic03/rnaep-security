version: "3.9"

services:
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8001:8000"
    volumes:
      - ./auth-service/data:/app/data
    command: sh -c "python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000"

  products-service:
    build:
      context: ./products-service
    container_name: products-service
    ports:
      - "8002:8000"
    volumes:
      - ./products-service/data:/app/data
    command: sh -c "python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000"

  orders-service:
    build:
      context: ./orders-service
    container_name: orders-service
    ports:
      - "8003:8000"
    volumes:
      - ./orders-service/data:/app/data
    depends_on:
      - products-service
      - notifications-service

  notifications-service:
    build:
      context: ./notifications-service
    container_name: notifications-service
    ports:
      - "8004:8000"

  gateway:
    build:
      context: ./gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - products-service
      - orders-service
      - notifications-service